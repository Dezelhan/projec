<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ: Пользователи</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #000;
        color: #e0e0e0;
        padding: 40px;
        margin: 0;
      }
      .bg-dark {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: -2;
      }
      .grid-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: -1;
        pointer-events: none;
        opacity: 0.3;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 2.5rem;
        color: #bb86fc;
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .users-list {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(30, 30, 30, 0.8);
        border: 1px solid rgba(187, 134, 252, 0.4);
        border-radius: 10px;
        padding: 20px;
        backdrop-filter: blur(6px);
      }
      .user-item {
        padding: 12px 16px;
        border-bottom: 1px solid #444;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
      }
      .user-item:last-child {
        border-bottom: none;
      }
      .user-item strong {
        color: #bb86fc;
      }
      .empty {
        text-align: center;
        color: #888;
        font-style: italic;
      }
      .btn {
        display: block;
        width: 200px;
        margin: 30px auto 0;
        padding: 12px;
        background: transparent;
        border: 1px solid #bb86fc;
        color: #bb86fc;
        text-align: center;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .btn:hover {
        background: rgba(187, 134, 252, 0.2);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="bg-dark"></div>
    <div class="grid-overlay"></div>

    <h1>Все пользователи</h1>

    <div class="users-list" id="usersContainer"></div>

    <a href="index.html" class="btn">На главную</a>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("usersContainer");
        const users = JSON.parse(localStorage.getItem("users")) || [];

        if (users.length === 0) {
          container.innerHTML =
            '<p class="empty">Пока нет зарегистрированных пользователей.</p>';
          return;
        }

        users.forEach((user) => {
          const div = document.createElement("div");
          div.className = "user-item";
          div.innerHTML = `
                    <strong>ID:</strong> ${user.id} <br>
                    <strong>Email:</strong> ${user.email} <br>
                    <strong>Дата регистрации:</strong> ${new Date(user.registeredAt).toLocaleString()} <br>
                    <strong>Пароль:</strong> ${user.password} <br>
                    <hr>
                `;
          container.appendChild(div);
        });
      });
    </script>
  </body>
</html>
