<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Регистрация - Podrabotka</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        .register-page {
            padding: 10rem 0 5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .register-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .register-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #bb86fc;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .register-title p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .register-form-container {
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(187, 134, 252, 0.4);
            border-radius: 16px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(187, 134, 252, 0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #bb86fc;
            background: rgba(187, 134, 252, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(187, 134, 252, 0.25);
        }

        .user-type-section {
            margin: 2.5rem 0;
        }

        .user-type-section h3 {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .user-type-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .user-type-option {
            cursor: pointer;
        }

        .user-type-option input[type="radio"] {
            display: none;
        }

        .user-type-content {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(187, 134, 252, 0.25);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }

        .user-type-option input[type="radio"]:checked + .user-type-content {
            background: rgba(187, 134, 252, 0.15);
            border-color: #bb86fc;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(187, 134, 252, 0.3);
        }

        .user-type-content i {
            font-size: 2rem;
            color: #bb86fc;
            margin-bottom: 0.8rem;
            display: block;
            transition: all 0.3s ease;
        }

        .user-type-option input[type="radio"]:checked + .user-type-content i {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(187, 134, 252, 0.5));
        }

        .user-type-content span {
            display: block;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
        }

        .user-type-content small {
            color: #aaa;
            font-size: 0.85rem;
            line-height: 1.4;
            display: block;
        }

        .user-type-option:hover .user-type-content {
            border-color: rgba(187, 134, 252, 0.5);
            transform: translateY(-2px);
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            margin: 2rem 0;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .terms-checkbox label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: #aaa;
            font-size: 0.95rem;
            cursor: pointer;
            line-height: 1.5;
            margin: 0;
        }

        .terms-checkbox input {
            width: auto;
            accent-color: #bb86fc;
            transform: scale(1.3);
            cursor: pointer;
            margin-top: 0.2rem;
            flex-shrink: 0;
        }

        .terms-checkbox a {
            color: #bb86fc;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .terms-checkbox a:hover {
            color: #fff;
            border-bottom-color: #bb86fc;
        }

        .btn-register {
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(135deg, rgba(187, 134, 252, 0.2), rgba(187, 134, 252, 0.1));
            border: 2px solid #bb86fc;
            color: #bb86fc;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-register:hover {
            color: #000;
            background: #bb86fc;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(187, 134, 252, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 2.5rem;
            color: #888;
            font-size: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-link a {
            color: #bb86fc;
            text-decoration: none;
            font-weight: 600;
            margin-left: 8px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #fff;
            border-bottom-color: #bb86fc;
        }

        @media (max-width: 768px) {
            .register-page {
                padding: 8rem 0 3rem;
            }

            .register-title h1 {
                font-size: 2.5rem;
            }

            .register-form-container {
                padding: 2rem;
            }

            .user-type-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-dark"></div>
    <div class="grid-overlay"></div>

    <header class="osnova-header">
        <div class="container">
            <a href="index.html" class="logotip">SparkGig</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="jobs.html">Вакансии</a>
                <a href="contact.html">Контакты</a>
                <div class="user-menu-wrapper">
                    <a href="login.html" class="register-icon">
                        <i class="fas fa-user-plus"></i>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="register-page">
        <div class="register-container">
            <div class="register-title">
                <h1>Создать аккаунт</h1>
                <p>Начните искать подработку прямо сейчас</p>
            </div>

            <div class="register-form-container">
                <form id="registerPageForm">
                    <div class="form-group">
                        <label for="registerName">Имя</label>
                        <input type="text" id="registerName" placeholder="Введите ваше имя" required>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="example@mail.ru" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Пароль</label>
                        <input type="password" id="registerPassword" placeholder="Минимум 5 символов" required>
                    </div>

                    <div class="form-group">
                        <label for="registerRepeatPassword">Повторите пароль</label>
                        <input type="password" id="registerRepeatPassword" placeholder="Повторите пароль" required>
                    </div>

                    <div class="user-type-section">
                        <h3>Выберите тип аккаунта:</h3>
                        <div class="user-type-options">
                            <label class="user-type-option">
                                <input type="radio" name="userType" value="job_seeker" checked>
                                <div class="user-type-content">
                                    <i class="fas fa-user"></i>
                                    <span>Ищу подработку</span>
                                    <small>Откликайтесь на вакансии</small>
                                </div>
                            </label>
                            <label class="user-type-option">
                                <input type="radio" name="userType" value="employer">
                                <div class="user-type-content">
                                    <i class="fas fa-briefcase"></i>
                                    <span>Я работодатель</span>
                                    <small>Размещайте вакансии</small>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label style="color: #bb86fc; display: block; margin-bottom: 8px;">Скан паспорта (обязательно):</label>
                        <input type="file" id="passportFile" accept="image/*" required 
                            style="background: rgba(255,255,255,0.05); border: 1px solid rgba(187,134,252,0.3); color: #fff; padding: 10px; width: 100%; border-radius: 8px;">
                    </div>


                    <div class="terms-checkbox">
                        <label>
                            <input type="checkbox" id="termsAgree" required>
                            <span>Я соглашаюсь с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-register">Зарегистрироваться</button>

                    <div class="login-link">
                        <span>Уже есть аккаунт?</span>
                        <a href="login.html">Войти</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        // Проверяем, не авторизован ли уже пользователь
        const currentUser = await getCurrentUser();
        if (currentUser) {
            showNotification('Вы уже авторизованы', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
            return;
        }

        const registerForm = document.getElementById('registerPageForm');
        const passwordInput = document.getElementById('registerPassword');
        const repeatPasswordInput = document.getElementById('registerRepeatPassword');

        // Валидация пароля в реальном времени
        if (passwordInput && repeatPasswordInput) {
            repeatPasswordInput.addEventListener('input', function() {
                if (passwordInput.value !== repeatPasswordInput.value) {
                    repeatPasswordInput.setCustomValidity('Пароли не совпадают');
                } else {
                    repeatPasswordInput.setCustomValidity('');
                }
            });

            passwordInput.addEventListener('input', function() {
                if (passwordInput.value !== repeatPasswordInput.value && repeatPasswordInput.value) {
                    repeatPasswordInput.setCustomValidity('Пароли не совпадают');
                } else {
                    repeatPasswordInput.setCustomValidity('');
                }
            });
        }

        if (registerForm) {
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Начало регистрации...');

                // Получаем значения полей
                const name = document.getElementById('registerName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const password = document.getElementById('registerPassword').value;
                const repeatPassword = document.getElementById('registerRepeatPassword').value;
                const userTypeElement = document.querySelector('input[name="userType"]:checked');
                const termsAgree = document.getElementById('termsAgree').checked;
                const fileInput = document.getElementById('passportFile');
                const file = fileInput.files[0];

                // Валидация
                if (!name || !email || !password || !repeatPassword) {
                    showNotification('Заполните все поля', 'error');
                    return;
                }

                if (name.length < 2) {
                    showNotification('Имя должно содержать минимум 2 символа', 'error');
                    return;
                }

                if (!isValidEmail(email)) {
                    showNotification('Введите корректный email', 'error');
                    return;
                }

                if (password.length < 5) {
                    showNotification('Пароль должен содержать минимум 5 символов', 'error');
                    return;
                }

                if (password !== repeatPassword) {
                    showNotification('Пароли не совпадают', 'error');
                    return;
                }

                if (!userTypeElement) {
                    showNotification('Выберите тип аккаунта', 'error');
                    return;
                }

                if (!termsAgree) {
                    showNotification('Необходимо согласиться с условиями использования', 'error');
                    return;
                }

                if (!file) {
                    showNotification('Загрузите скан паспорта', 'error');
                    return;
                }

                // Проверка типа файла
                if (!file.type.startsWith('image/')) {
                    showNotification('Пожалуйста, загрузите изображение', 'error');
                    return;
                }

                // Проверка размера файла (макс 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showNotification('Размер файла не должен превышать 5MB', 'error');
                    return;
                }

                const userType = userTypeElement.value;

                console.log('Данные формы:', {
                    name,
                    email,
                    userType,
                    fileSize: file.size,
                    fileName: file.name
                });

                // Показываем индикатор загрузки
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.textContent;
                submitBtn.textContent = 'Регистрация...';
                submitBtn.disabled = true;

                try {
                    // Читаем файл как base64
                    const reader = new FileReader();
                    
                    reader.onload = async function() {
                        const base64Data = reader.result;
                        
                        console.log('Файл прочитан, отправка на сервер...');

                        try {
                            const response = await fetch('/api/register.php', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                credentials: 'include',
                                body: JSON.stringify({
                                    email: email,
                                    password: password,
                                    userType: userType,
                                    name: name,
                                    extraData: {
                                        name: name,
                                        passportData: base64Data
                                    }
                                })
                            });

                            console.log('Ответ сервера получен, статус:', response.status);

                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }

                            const result = await response.json();
                            console.log('Результат регистрации:', result);

                            if (result.success) {
                                // Сохраняем данные пользователя если они пришли
                                if (result.user) {
                                    // Обновляем глобального пользователя
                                    if (typeof window.updateCurrentUser === 'function') {
                                        window.updateCurrentUser(result.user);
                                    }
                                    // Сохраняем в localStorage
                                    localStorage.setItem('podrabotka_current_user', JSON.stringify(result.user));
                                }

                                showNotification('Регистрация успешна! Вы автоматически вошли в систему', 'success');
                                
                                // Перенаправляем на главную
                                setTimeout(() => {
                                    window.location.href = 'index.html';
                                }, 1500);
                            } else {
                                showNotification(result.message || 'Ошибка регистрации', 'error');
                                submitBtn.textContent = originalBtnText;
                                submitBtn.disabled = false;
                            }
                        } catch (error) {
                            console.error('Ошибка запроса:', error);
                            showNotification('Ошибка соединения с сервером. Проверьте подключение к интернету.', 'error');
                            submitBtn.textContent = originalBtnText;
                            submitBtn.disabled = false;
                        }
                    };

                    reader.onerror = function() {
                        console.error('Ошибка чтения файла');
                        showNotification('Ошибка при чтении файла', 'error');
                        submitBtn.textContent = originalBtnText;
                        submitBtn.disabled = false;
                    };

                    reader.readAsDataURL(file);
                    
                } catch (error) {
                    console.error('Ошибка:', error);
                    showNotification('Произошла ошибка при регистрации', 'error');
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                }
            });
        }

        // Функция валидации email
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Добавляем стили для уведомлений если их нет
        if (!document.querySelector('#notification-styles')) {
            const style = document.createElement('style');
            style.id = 'notification-styles';
            style.textContent = `
                .notification {
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    border-radius: 8px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    min-width: 300px;
                    max-width: 500px;
                    z-index: 10000;
                    animation: notificationSlideIn 0.3s ease;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                }
                
                .notification.success {
                    background: linear-gradient(135deg, #4caf50, #45a049);
                    color: white;
                    border-left: 4px solid #2e7d32;
                }
                
                .notification.error {
                    background: linear-gradient(135deg, #f44336, #e53935);
                    color: white;
                    border-left: 4px solid #c62828;
                }
                
                .notification.info {
                    background: linear-gradient(135deg, #2196f3, #1e88e5);
                    color: white;
                    border-left: 4px solid #1565c0;
                }
                
                .notification.warning {
                    background: linear-gradient(135deg, #ff9800, #fb8c00);
                    color: white;
                    border-left: 4px solid #e65100;
                }
                
                .notification-content {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                }
                
                .notification-close {
                    background: none;
                    border: none;
                    color: white;
                    cursor: pointer;
                    padding: 5px;
                    opacity: 0.8;
                    transition: opacity 0.3s;
                }
                
                .notification-close:hover {
                    opacity: 1;
                }
                
                @keyframes notificationSlideIn {
                    from {
                        transform: translateX(100%);
                        opacity: 0;
                    }
                    to {
                        transform: translateX(0);
                        opacity: 1;
                    }
                }
            `;
            document.head.appendChild(style);
        }
    });
</script>
</body>
</html>
