<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Создать вакансию - Podrabotka</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        .create-job-page {
            padding: 10rem 0 5rem;
            min-height: 100vh;
        }

        .create-job-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .create-job-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .create-job-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #bb86fc;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .create-job-header p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .create-job-form {
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(187, 134, 252, 0.4);
            border-radius: 16px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;

        }

        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(187, 134, 252, 0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #bb86fc;
            background: rgba(30, 30, 30, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(187, 134, 252, 0.25);
        }

        .salary-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .salary-input input {
            flex: 1;
        }

        .salary-currency {
            color: #aaa;
            white-space: nowrap;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-create-job {
            flex: 1;
            padding: 1.2rem;
            background: linear-gradient(135deg, rgba(187, 134, 252, 0.2), rgba(187, 134, 252, 0.1));
            border: 2px solid #bb86fc;
            color: #bb86fc;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-create-job:hover {
            color: #000;
            background: #bb86fc;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(187, 134, 252, 0.4);
        }

        .btn-cancel-job {
            padding: 1.2rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #666;
            color: #aaa;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-cancel-job:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .requirements-list {
            margin-top: 1rem;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .requirement-item input {
            flex: 1;
        }

        .btn-add-requirement {
            padding: 0.5rem 1rem;
            background: rgba(187, 134, 252, 0.1);
            border: 1px solid rgba(187, 134, 252, 0.3);
            color: #bb86fc;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn-add-requirement:hover {
            background: rgba(187, 134, 252, 0.2);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .create-job-form {
                padding: 2rem;
            }

            .create-job-header h1 {
                font-size: 2.5rem;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-dark"></div>
    <div class="grid-overlay"></div>

    <header class="osnova-header">
        <div class="container">
            <a href="index.html" class="logotip">Podrabotka</a>
            <nav>
                <a href="index.html">Главная</a>
                <a href="jobs.html">Вакансии</a>
                <a href="contact.html">Контакты</a>
                <div class="user-menu-wrapper">
                    <a href="profil.html" class="register-icon">
                        <i class="fas fa-user-check"></i>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="create-job-page">
        <div class="create-job-container">
            <div class="create-job-header">
                <h1>Создать вакансию</h1>
                <p>Разместите вакансию и найдите подходящего сотрудника</p>
            </div>

            <div class="create-job-form">
                <form id="createJobForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobTitle">Должность *</label>
                            <input type="text" id="jobTitle" placeholder="Например: Бариста, Курьер" required>
                        </div>
                        <div class="form-group">
                            <label for="jobCategory">Категория *</label>
                            <select id="jobCategory" required>
                                <option value="">Выберите категорию</option>
                                <option value="restaurant">Общественное питание</option>
                                <option value="delivery">Доставка</option>
                                <option value="retail">Торговля</option>
                                <option value="office">Офисная работа</option>
                                <option value="remote">Удалённая работа</option>
                                <option value="other">Другое</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobLocation">Местоположение *</label>
                            <input type="text" id="jobLocation" placeholder="Например: Центр, Левобережный" required>
                        </div>
                        <div class="form-group">
                            <label for="jobSalary">Зарплата *</label>
                            <div class="salary-input">
                                <input type="text" id="jobSalary" placeholder="Например: 45 000" required>
                                <span class="salary-currency">руб.</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="jobDescription">Описание вакансии *</label>
                        <textarea id="jobDescription" placeholder="Опишите обязанности, условия работы, требования" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="jobRequirements">Требования</label>
                        <div id="requirementsList" class="requirements-list">
                            <div class="requirement-item">
                                <input type="text" placeholder="Например: Опыт работы от 1 года">
                            </div>
                        </div>
                        <button type="button" class="btn-add-requirement" onclick="addRequirement()">
                            <i class="fas fa-plus"></i> Добавить требование
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="jobBenefits">Условия и преимущества</label>
                        <textarea id="jobBenefits" placeholder="Что вы предлагаете: график, обучение, бонусы"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobSchedule">График работы</label>
                            <select id="jobSchedule">
                                <option value="">Выберите график</option>
                                <option value="full-time">Полный день</option>
                                <option value="part-time">Неполный день</option>
                                <option value="shift">Сменный график</option>
                                <option value="flexible">Гибкий график</option>
                                <option value="remote">Удалённо</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="jobContacts">Контакты для связи *</label>
                            <input type="text" id="jobContacts" placeholder="Email или телефон" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel-job" onclick="window.location.href='jobs.html'">
                            Отмена
                        </button>
                        <button type="submit" class="btn-create-job">
                            <i class="fas fa-paper-plane"></i> Опубликовать вакансию
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const user = await getCurrentUser();

            if (!user) {
                showNotification('Для создания вакансии необходимо войти в систему', 'warning');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            if (user.role !== 'employer') {
                showNotification('Только работодатели могут создавать вакансии', 'warning');
                setTimeout(() => {
                    window.location.href = 'jobs.html';
                }, 1500);
                return;
            }

            document.getElementById('jobContacts').value = user.phone || user.email;

            const form = document.getElementById('createJobForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                createJob();
            });
        });

        let requirementCount = 1;

        function addRequirement() {
            requirementCount++;
            const container = document.getElementById('requirementsList');
            const div = document.createElement('div');
            div.className = 'requirement-item';
            div.innerHTML = `
                <input type="text" placeholder="Требование #${requirementCount}">
                <button type="button" onclick="removeRequirement(this)" style="background:transparent;border:none;color:#ff5757;cursor:pointer;">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(div);
        }

        function removeRequirement(button) {
            if (document.querySelectorAll('.requirement-item').length > 1) {
                button.parentElement.remove();
            }
        }

        async function createJob() {
            const user = await getCurrentUser();
            if (!user || user.role !== 'employer') {
                showNotification('Только работодатели могут создавать вакансии', 'error');
                return;
            }

            const jobData = {
                title: document.getElementById('jobTitle').value.trim(),
                category: document.getElementById('jobCategory').value,
                location: document.getElementById('jobLocation').value.trim(),
                salary: document.getElementById('jobSalary').value.trim() + ' руб.',
                description: document.getElementById('jobDescription').value.trim(),
                requirements: Array.from(document.querySelectorAll('#requirementsList input'))
                    .map(input => input.value.trim())
                    .filter(text => text !== ''),
                benefits: document.getElementById('jobBenefits').value.trim(),
                schedule: document.getElementById('jobSchedule').value,
                contacts: document.getElementById('jobContacts').value.trim()
            };

            if (!jobData.title || !jobData.location || !jobData.salary || !jobData.description || !jobData.contacts) {
                showNotification('Заполните обязательные поля (отмечены *)', 'error');
                return;
            }

            const result = await createJobVacancy(jobData);

            if (result.success) {
                showNotification('Вакансия успешно опубликована!', 'success');
                setTimeout(() => {
                    window.location.href = 'my-jobs.html';
                }, 1500);
            } else {
                showNotification(result.message || 'Ошибка при создании вакансии', 'error');
            }
        }
    </script>
</body>
</html>
